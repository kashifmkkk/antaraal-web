# Render.com Blueprint - Antaraal Skyway Trade Backend
# https://render.com/docs/blueprint-spec

databases:
  - name: antaraal-db
    plan: free
    databaseName: antaraal
    user: antaraal

services:
  - type: web
    name: antaraal-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: antaraal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
