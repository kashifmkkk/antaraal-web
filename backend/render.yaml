# Render.com Blueprint - Antaraal Skyway Trade Backend
# https://render.com/docs/blueprint-spec

databases:
  - name: antaraal-db
    plan: free
    databaseName: antaraal
    user: antaraal

services:
  - type: web
    name: antaraal-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:render
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: antaraal-db
          property: internalConnectionString
      - key: DATABASE_URL_EXTERNAL
        fromDatabase:
          name: antaraal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DB_MIGRATE_MAX_ATTEMPTS
        value: 15
      - key: DB_MIGRATE_BASE_DELAY_MS
        value: 2000
