version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: antaraal
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/antaraal?schema=public"
    ports:
      - "4000:4000"
    depends_on:
      - db

volumes:
  db-data:
